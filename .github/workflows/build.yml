name: EAS Build

on:
  push:
    branches:
      - main
    paths:
      - '**.js'
      - '**.jsx'
      - '**.ts'
      - '**.tsx'
      - 'app.json'
      - 'eas.json'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches:
      - main
    paths:
      - '**.js'
      - '**.jsx'
      - '**.ts'
      - '**.tsx'
      - 'app.json'
      - 'eas.json'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build:
    name: Build ${{ matrix.platform }} (preview)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        platform: [android, ios]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build ${{ matrix.platform }} (preview)
        run: eas build --platform ${{ matrix.platform }} --profile preview --non-interactive
